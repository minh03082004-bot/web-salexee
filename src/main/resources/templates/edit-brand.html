<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Sửa hãng xe</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container py-5">

<div class="d-flex
            justify-content-between
            align-items-center
            mb-4">

    <h2>
        Sửa hãng xe
    </h2>

    <a href="/admin/brands"
       class="btn btn-secondary">
        ⬅ Quay lại
    </a>

</div>
<form action="/admin/brands/update"
      method="post">
    <input type="hidden"
           name="id"
           th:value="${brand.id}">

    <div class="mb-3">

        <label>Tên hãng</label>

        <input type="text"
               name="name"
               class="form-control"
               th:value="${brand.name}"
               required>
    </div>
    
    <button class="btn btn-success">

        Cập nhật

    </button>

</form>

</body>

</html>
