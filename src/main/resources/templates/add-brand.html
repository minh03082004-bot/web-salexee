<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Thêm hãng</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container py-5">

<!-- <h2 class="mb-4">
    Thêm hãng xe
</h2> -->
<div class="d-flex
            justify-content-between
            align-items-center
            mb-4">

    <h2>
        Thêm hãng xe
    </h2>

    <a href="/admin/brands"
       class="btn btn-secondary">

        ⬅ Quay lại

    </a>

</div>

<form action="/admin/brands/save"
      method="post"
      enctype="multipart/form-data">

    <div class="mb-3">

        <label>Tên hãng</label>

        <input type="text"
               name="name"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Logo hãng</label>

        <input type="file"
               name="logoFile"
               class="form-control"
               required>

    </div>

    <button class="btn btn-success">

        Lưu hãng

    </button>

</form>

</body>

</html>
