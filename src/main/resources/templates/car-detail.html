<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.0}">
</head>
<body>
    <div class="container py-5">
        <div class="row">
            <div class="col-md-6">
     <img id="mainImage"
     th:src="${car.image.startsWith('http')} ? ${car.image} : @{/images/{file}(file=${car.image})}"
     class="main-img">

<div class="sub-img-container"
     th:if="${!#lists.isEmpty(imageList)}">

    <img th:each="img : ${imageList}"
         th:src="@{/images/{file}(file=${img})}"
         class="sub-img"
         onclick="changeImage(this)">
</div>
            </div>
            <div class="col-md-6">
                <h1 class="fw-bold" th:text="${car.name}">Tên xe</h1>
                <h3 class="text-danger my-3" 
                    th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></h3>
                <p><strong>Năm sản xuất:</strong> <span th:text="${car.year}"></span></p>
                <hr>
                <h5>Mô tả chi tiết:</h5>
                <p th:text="${car.description}"style="white-space: pre-line;">Thông tin mô tả xe sẽ hiển thị ở đây...</p>
                
                <div class="mt-4 d-grid gap-2 d-md-block">

                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Quay lại</a>
                </div>
            </div>
        </div>
    </div>
   <script>
function changeImage(img){
    document.getElementById("mainImage").src = img.src;

    document.querySelectorAll('.sub-img').forEach(i => i.classList.remove('active'));
    img.classList.add('active');
}
</script>
</body>
</html>
