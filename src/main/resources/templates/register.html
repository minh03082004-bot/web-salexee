<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
body{
    background:#f5f7fa;
}

.register-box{
    width:420px;
    margin:80px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#198754;
}

.btn-register{
    width:100%;
}

.link-login{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="register-box">

    <h2>Đăng ký tài khoản</h2>
    <div th:if="${param.error}" class="alert alert-danger">
        Tên đăng nhập đã tồn tại
    </div>

    <form action="/register" method="post">

        <div class="mb-3">
            <label>Tên đăng nhập</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Mật khẩu</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success btn-register">
            Đăng ký
        </button>

    </form>

    <div class="link-login">
        Đã có tài khoản?
        <a href="/login">Đăng nhập</a>
    </div>

</div>

</body>
</html>
