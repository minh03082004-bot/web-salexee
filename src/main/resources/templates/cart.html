<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">
        🛒 Giỏ hàng của bạn
    </h2>
     <a href="/cars"class="btn btn-outline-dark">
        ← Quay lại
    </a>
     
    <div class="row">
        <div class="col-md-8">

            <div class="card mb-3"
                 th:each="car : ${cart}">

                <div class="row g-0">

                    <div class="col-md-4">
                             <img th:src="${car.image.startsWith('http')} 
              ? ${car.image}: @{/images/{file}(file=${car.image})}"
                             class="img-fluid rounded-start"
                               style="height:200px; object-fit:cover;">

                    </div>

                    <div class="col-md-8">

                        <div class="card-body">

                            <h5 th:text="${car.name}"></h5>

                            <p>
                                Giá:
                                <b th:text="${#numbers.formatDecimal(car.price,0,'COMMA',0,'POINT')} + ' VNĐ'">
                                </b>
                            </p>

                            <a th:href="@{/cart/remove/{id}(id=${car.id})}"
                               class="btn btn-danger">

                                Xóa

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4 shadow">

                <h4>Thông tin đặt mua</h4>

                <hr>

                <p>
                    Tên:
                    <b th:text="${session.user.username}"></b>
                </p>

                <p>
                    Tổng xe:
                    <b th:text="${cart.size()}"></b>
                </p>

                <p>
                    Tổng tiền:
                    <b th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' VNĐ'">
                    </b>
                </p>
                <div class="mb-3">
               <label>
                Số điện thoại
               </label>
           <input type="text"
           id="phone"
           class="form-control"
           placeholder="Nhập số điện thoại">
            </div>
                <!-- <a href="/cart/checkout"
                class="btn btn-success w-100">

                  Đặt mua

                  </a> -->
                  <a id="checkoutBtn"
                    href="/cart/checkout"
                  class="btn btn-success w-100">

               Đặt mua

               </a>

            </div>

        </div>

    </div>

</div>
<script>

document
.getElementById("checkoutBtn")
.addEventListener("click", function(e) {

    e.preventDefault();

    let phone =
        document.getElementById("phone").value;

    if(phone.trim() === "") {

        alert("Vui lòng nhập số điện thoại!");

        return;
    }

    window.location.href =
        "/cart/checkout?phone="
        + encodeURIComponent(phone);
});

</script>
</body>
</html>
