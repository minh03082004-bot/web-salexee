 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sale Xee - Showroom Ô Tô</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=5}">
</head>
    <body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">

    <div class="container d-flex justify-content-between align-items-center">

        <a class="navbar-brand fw-bold" href="/cars">
            SALE XEE
        </a>

        <div class="d-flex align-items-center gap-3">
            <div th:if="${session.user == null}">
                <a href="/login" class="text-white me-3 text-decoration-none">
                    Đăng nhập
                </a>

                <a href="/register" class="text-white text-decoration-none">
                    Đăng ký
                </a>
            </div>

           <div th:if="${session.user != null}">
                <a href="/cart"class="btn btn-outline-light position-relative">
                       🛒 
                     <span class="badge bg-danger"
                    th:text="${cartCount}">
                      </span>
                     </a>
                     </div>
     <a href="/my-orders"
   class="btn btn-outline-light">

    📦 Đơn hàng

   </a>
    <div th:if="${session.user != null}">

    <span class="text-white me-3">
        Xin chào,
        <b th:text="${session.user.username}"></b>
    </span>

    <a href="/logout"
       class="text-white text-decoration-none">
        Đăng xuất
    </a>

</div>

        </div>

    </div>

</nav>
<div class="container mt-4">
    <div id="carBanner"
     class="carousel slide mb-5"
     data-bs-ride="carousel">

    <div class="carousel-indicators">

        <button type="button"
                data-bs-target="#carBanner"
                data-bs-slide-to="0"
                class="active">
        </button>

        <button type="button"
                data-bs-target="#carBanner"
                data-bs-slide-to="1">
        </button>

    </div>

    <div class="carousel-inner rounded shadow">

        <div class="carousel-item active">

            <img src="/images/banner1.png"
                 class="d-block w-100"
                 style="height:350px; object-fit:contain; background:black;">

        </div>

        <div class="carousel-item">

            <img src="/images/banner2.png"
                 class="d-block w-100"
                    style="height:350px; object-fit:contain; background:black;">

        </div>

    </div>

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#carBanner"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon">
        </span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#carBanner"
            data-bs-slide="next">

        <span class="carousel-control-next-icon">
        </span>

    </button>

</div>
</div>

    <div class="container">
        <h2 class="mb-4">Danh sách xe đang bán</h2> 
        <div class="card shadow-sm mb-4 p-3">  
      <form th:action="@{/cars}" method="get">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" name="keyword"
                       class="form-control"
                       placeholder="Nhập tên xe..."
                       th:value="${keyword}">
            </div>

             <div class="col-md-3">
        <select name="brand" class="form-control">
            <option value="">Tất cả hãng</option>
            <option value="Toyota">Toyota</option>
            <option value="Audi">Audi</option>
            <option value="Mercedes">Mercedes</option>
            <option value="VinFast">VinFast</option>
        </select>
    </div>
            <div class="col-md-2">
                <input type="number" name="minPrice"
                       class="form-control"
                       placeholder="Giá từ"
                       th:value="${minPrice}">
            </div>
            <div class="col-md-2">
                <input type="number" name="maxPrice"
                       class="form-control"
                       placeholder="Đến"
                       th:value="${maxPrice}">
            </div>

            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">
                    🔍 Tìm kiếm
                </button>
            </div>

        </div>
    </form>
</div>

<div class="brand-list">

    <a th:href="@{/cars(brand='Toyota')}"
       class="brand-item"
       th:classappend="${brand == 'Toyota'} ? ' active'">

        <img th:src="@{/images/logo/toyota.png}" class="brand-logo">
        <span>Toyota</span>
    </a>
   

    <a th:href="@{/cars(brand='Audi')}"
       class="brand-item"
       th:classappend="${brand == 'Audi'} ? ' active'">

        <img th:src="@{/images/logo/Audi.png}" class="brand-logo">
        <span>Audi</span>
    </a>

    <a th:href="@{/cars(brand='Honda')}"
       class="brand-item"
       th:classappend="${brand == 'Honda'} ? ' active'">

        <img th:src="@{/images/logo/honda.png}" class="brand-logo">
        <span>Honda</span>
    </a>

    <a th:href="@{/cars(brand='Kia')}"
       class="brand-item"
       th:classappend="${brand == 'Kia'} ? ' active'">

        <img th:src="@{/images/logo/kia.png}" class="brand-logo">
        <span>KIA</span>
    </a>
     <a th:href="@{/cars(brand='Hyundai')}"
       class="brand-item"
       th:classappend="${brand == 'Hyundai'} ? ' active'">

        <img th:src="@{/images/logo/hyundai.png}" class="brand-logo">
        <span>Hyundai</span>
    </a>
     <a th:href="@{/cars(brand='Mazda')}"
       class="brand-item"
       th:classappend="${brand == 'Mazda'} ? ' active'">

        <img th:src="@{/images/logo/mazda.png}" class="brand-logo">
        <span>Mazda</span>
    </a>

</div>

            <div class="row">  
     <div class="col-md-4 mb-4" th:each="xe : ${listXe}">
        <div class="card shadow-sm h-100">
            <div class="car-img-container">
            <img th:src="${xe.image.startsWith('http')} 
              ? ${xe.image}: @{/images/{file}(file=${xe.image})}" class="card-img-top" alt="Car">
            </div>
            <div class="card-body">
                <h5 class="card-title fw-bold" th:text="${xe.name}">Tên xe mẫu</h5>
                <p class="text-danger fw-bold fs-5" 
                   th:text="${#numbers.formatDecimal(xe.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                </p>
                
                <p class="card-text text-muted small mb-3">
                    Năm sản xuất: <span th:text="${xe.year}">2024</span>
                </p>
                
                <div class="mt-auto d-grid gap-2">
                    <a th:href="@{/car-detail/{id}(id=${xe.id})}" class="btn btn-primary">Xem chi tiết</a>
                                <a th:href="@{/cart/add/{id}(id=${xe.id})}" 
                                  class="btn btn-warning">
                                     🛒 Thêm giỏ hàng
                                   </a>
                    </div> 
                </div>
             </div>
         </div>
             </div>
             <div class="d-flex justify-content-center mt-4">

    <ul class="pagination">
        <li class="page-item" th:if="${currentPage > 0}">
            <a class="page-link"
               th:href="@{/cars(page=${currentPage-1},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}">
               Previous
            </a>
        </li>

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, totalPages-1)}"
            th:classappend="${i == currentPage} ? 'active'">

            <a class="page-link"
               th:href="@{/cars(page=${i},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}"
               th:text="${i+1}">
            </a>

        </li>

        <li class="page-item"
            th:if="${currentPage < totalPages-1}">

            <a class="page-link"
               th:href="@{/cars(page=${currentPage+1},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}">
               Next
            </a>

        </li>

    </ul>
             
</div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
         </body>
</html>
