 
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h2>THÊM XE MỚI VÀO HỆ THỐNG</h2>
    <form th:action="@{/admin/save}" th:object="${car}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{image}"> 
    <div class="mb-3">
        <label>Tên xe:</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>
    <input type="text" id="priceInput" th:field="*{price}" placeholder="Nhập giá xe" onkeyup="formatPrice(this)">

    <div class="mb-3">
    <label>Chọn ảnh từ thư viện máy tính (ảnh chính):</label>
    <input type="file" name="imageFile" class="form-control" accept="image/*">
</div>

<div class="mb-3">
    <label>Ảnh chi tiết (nhiều ảnh):</label>
    <input type="file" name="subImages" multiple class="form-control" accept="image/*">
</div>

    <div class="mb-3">
        <label>Năm sản xuất:</label>
        <input type="text" th:field="*{year}" class="form-control">
    </div>
        <input type="text" name="brand" class="form-control" placeholder="Hãng xe">

    <div class="mb-3">
        <label>Mô tả chi tiết:</label>
        <textarea th:field="*{description}" class="form-control" rows="5" style="white-space: pre-line;"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Thêm xe mới</button>
    <a href="/admin/cars" class="btn btn-secondary">Hủy bỏ</a>

</form>
<script>
function formatPrice(input) {

    let value = input.value;

    value = value.replace(/,/g, "");

    if (!isNaN(value) && value !== "") {
        value = Number(value).toLocaleString("en-US");
        input.value = value;
    }
}
</script>
<script>
document.querySelector("form").addEventListener("submit", function() {

    let price = document.getElementById("priceInput");

    price.value = price.value.replace(/,/g, "");

});
</script>

</body>
</html>
