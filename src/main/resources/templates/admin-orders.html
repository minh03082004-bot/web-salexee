<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Quản lý đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            📦 Quản lý đơn hàng
        </h2>

        <button onclick="history.back()"
                class="btn btn-secondary">

            ← Quay lại

        </button>

    </div>

    <table class="table table-bordered table-hover bg-white shadow">

        <thead class="table-dark">

        <tr>

            <th>User</th>

            <th>Ảnh</th>

            <th>Tên xe</th>

            <th>Giá</th>

            <th>Ngày mua</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="o : ${orders}">

            <td th:text="${o.username}">
            </td>

            <td>

                <img th:src="${o.car.image.startsWith('http')} 
              ? ${o.car.image}: @{/images/{file}(file=${o.car.image})}"
                     width="120"
                     style="object-fit:cover; border-radius:10px;">

            </td>

            <td th:text="${o.car.name}">
            </td>

            <td th:text="${#numbers.formatDecimal(o.car.price,0,'COMMA',0,'POINT')} + ' VNĐ'">
            </td>

            <td th:text="${o.orderDate}">
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
