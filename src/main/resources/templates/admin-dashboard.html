<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h2 class="mb-4">📊 Dashboard</h2>

<div class="row">

    <!-- TỔNG XE -->
    <div class="col-md-4">
        <div class="card text-center p-3 shadow">
            <h5>Tổng số xe</h5>
            <h2 th:text="${totalCars}"></h2>
        </div>
    </div>

    <!-- TỔNG USER -->
    <div class="col-md-4">
        <div class="card text-center p-3 shadow">
            <!-- <h5>Tổng user</h5>
            <h2 th:text="${totalUsers}"></h2> -->
            <h5>User</h5>
<h2 th:text="${totalUsers}"></h2>

<h5>Admin</h5>
<h2 th:text="${totalAdmins}"></h2>
        </div>
    </div>

</div>

<hr>

<h4>Số xe theo hãng</h4>

<table class="table table-bordered">
    <tr>
        <th>Hãng</th>
        <th>Số lượng</th>
    </tr>

    <tr th:each="item : ${brandStats}">
        <td th:text="${item[0]}"></td>
        <td th:text="${item[1]}"></td>
    </tr>

</table>

</body>
</html>
