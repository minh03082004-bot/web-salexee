<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
body{
    background:#f5f7fa;
}

.login-box{
    width:400px;
    margin:100px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#0d6efd;
}

.btn-login{
    width:100%;
}

.link-register{
    text-align:center;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>Đăng nhập</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Sai tài khoản hoặc mật khẩu
    </div>
    <div th:if="${success}"
     class="alert alert-success">

    <span th:text="${success}">
    </span>

     </div>
    <div th:if="${param.locked}" class="alert alert-warning">
        Tài khoản của bạn đã bị khóa.
    </div>

    <form action="/login" method="post">

        <div class="mb-3">
            <label>Tên đăng nhập</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   required>
        </div>

      
        <div class="mb-3">

    <label>Mật khẩu</label>

    <div class="position-relative">

        <input type="password"
               id="password"
               name="password"
               class="form-control"
               required>

        <span onclick="togglePassword()"
              style="
                  position:absolute;
                  right:15px;
                  top:50%;
                  transform:translateY(-50%);
                  cursor:pointer;
              ">

            👁

        </span>

    </div>

</div>


        <button type="submit"
                class="btn btn-primary btn-login">
            Đăng nhập
        </button>

    </form>

    <div class="link-register">
        Chưa có tài khoản?
        <a href="/register">Đăng ký ngay</a>
    </div>

</div>
<script>

function togglePassword() {

    let password =
        document.getElementById("password");

    if (password.type === "password") {

        password.type = "text";

    } else {

        password.type = "password";
    }
}

</script>
</body>
</html>
