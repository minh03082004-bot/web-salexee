</head>

<div class="d-flex
            justify-content-between
            align-items-center
            mb-4">

    <h2>
        Quản lý hãng xe
    </h2>

    <div>

        <a href="/admin/cars"
           class="btn btn-secondary">

            ⬅ Quay lại

        </a>

        <a href="/admin/brands/add"
           class="btn btn-success">

            + Thêm hãng

        </a>

    </div>

</div>

<table class="table table-bordered">

    <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Logo</th>

            <th>Tên hãng</th>

        </tr>

    </thead>

    <tbody>

        <tr th:each="b : ${brands}">

            <td th:text="${b.id}"></td>

            <td>

                <img th:src="@{/images/{f}(f=${b.logo})}"
                     width="80">

            </td>

            <td th:text="${b.name}"></td>

        </tr>

    </tbody>

</table>

</body>

</html>
