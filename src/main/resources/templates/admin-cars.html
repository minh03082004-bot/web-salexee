
  <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=5}">
</head>
<div th:if="${success}">
    <script>
        alert("[[${success}]]");
    </script>
</div>
  <body class="bg-light">
   <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold" href="/cars">SALE XEE</a>
        <div class="d-flex align-items-center gap-3">
            <div th:if="${session.user != null and session.user.role == 'ADMIN'}">
                <a href="/admin/dashboard" class="btn btn-warning">
                    📊 Dashboard
                </a>
            </div>
            <a href="/admin/orders"
             class="btn btn-outline-light">
         📦 Quản lý đơn hàng
             </a>
            <div th:if="${session.user != null and session.user.role == 'ADMIN'}">
                <a href="/admin/add" class="btn btn-light">
                    + Thêm xe mới vào hệ thống
                </a>
            </div>
             <div th:if="${session.user != null}">
                 <a href="/logout" class="btn btn-danger">
                   Đăng xuất
                </a>
             </div>

        </div>
    </div>
</nav>
<div class="container mt-4">
    <div id="carBanner"
     class="carousel slide mb-5"
     data-bs-ride="carousel">

   
    <div class="carousel-indicators">

        <button type="button"
                data-bs-target="#carBanner"
                data-bs-slide-to="0"
                class="active">
        </button>

        <button type="button"
                data-bs-target="#carBanner"
                data-bs-slide-to="1">
        </button>

    </div>

   
    <div class="carousel-inner rounded shadow">

        <div class="carousel-item active">

            <img src="/images/banner1.png"
                 class="d-block w-100"
                 style="height:350px; object-fit:contain; background:black;">

        </div>

        <div class="carousel-item">

            <img src="/images/banner2.png"
                 class="d-block w-100"
                 style="height:350px; object-fit:contain; background:black;">

        </div>

    </div>

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#carBanner"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon">
        </span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#carBanner"
            data-bs-slide="next">

        <span class="carousel-control-next-icon">
        </span>

    </button>

</div>
</div>

    <div class="container">
        <h2 class="mb-4 text-dark">Hệ thống quản lý xe</h2> 
        <div class="card shadow-sm mb-4 p-3">
    <form th:action="@{/admin/cars}" method="get">
        <div class="row g-2">

            <!-- Tên xe -->
            <div class="col-md-3">
                <input type="text" name="keyword"
                       class="form-control"
                       placeholder="Nhập tên xe..."
                       th:value="${keyword}">
            </div>
             <div class="col-md-3">
        <select name="brand" class="form-control">
            <option value="">Tất cả hãng</option>
            <option value="Toyota">Toyota</option>
            <option value="Audi">Audi</option>
            <option value="Mercedes">Mercedes</option>
            <option value="VinFast">VinFast</option>
        </select>
    </div>
            <div class="col-md-2">
                <input type="number" name="minPrice"
                       class="form-control"
                       placeholder="Giá từ"
                       th:value="${minPrice}">
            </div>
            <div class="col-md-2">
                <input type="number" name="maxPrice"
                       class="form-control"
                       placeholder="Đến"
                       th:value="${maxPrice}">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">
                    🔍 Tìm kiếm
                </button>
            </div>

        </div>
    </form>
</div>
<div class="brand-list">

    <a th:href="@{/cars(brand='Toyota')}"
       class="brand-item"
       th:classappend="${brand == 'Toyota'} ? ' active'">

        <img th:src="@{/images/logo/toyota.png}" class="brand-logo">
        <span>Toyota</span>
    </a>
   

    <a th:href="@{/cars(brand='Audi')}"
       class="brand-item"
       th:classappend="${brand == 'Audi'} ? ' active'">

        <img th:src="@{/images/logo/audi.png}" class="brand-logo">
        <span>Audi</span>
    </a>

    <a th:href="@{/cars(brand='Honda')}"
       class="brand-item"
       th:classappend="${brand == 'Honda'} ? ' active'">

        <img th:src="@{/images/logo/honda.png}" class="brand-logo">
        <span>Honda</span>
    </a>

    <a th:href="@{/cars(brand='Kia')}"
       class="brand-item"
       th:classappend="${brand == 'Kia'} ? ' active'">

        <img th:src="@{/images/logo/kia.png}" class="brand-logo">
        <span>KIA</span>
    </a>
     <a th:href="@{/cars(brand='Hyundai')}"
       class="brand-item"
       th:classappend="${brand == 'Hyundai'} ? ' active'">

        <img th:src="@{/images/logo/hyundai.png}" class="brand-logo">
        <span>Hyundai</span>
    </a>
     <a th:href="@{/cars(brand='Mazda')}"
       class="brand-item"
       th:classappend="${brand == 'Mazda'} ? ' active'">

        <img th:src="@{/images/logo/mazda.png}" class="brand-logo">
        <span>Mazda</span>
    </a>

</div>
        <div class="row">
            <div class="col-md-4 mb-4" th:each="xe : ${listXe}">
                        <div class="card shadow-sm h-100">
                            <div class="car-img-container">
                        <img th:src="${xe.image.startsWith('http')} 
              ? ${xe.image}: @{/images/{file}(file=${xe.image})}" class="card-img-top" alt="Car">
            </div>
            
                      <div class="card-body">
                <h5 class="card-title fw-bold" th:text="${xe.name}">Tên xe mẫu</h5>
                <p class="text-danger fw-bold fs-5" 
                   th:text="${#numbers.formatDecimal(xe.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                </p>
                <div class="mt-auto d-grid gap-2">
            
                 <p class="card-text text-muted small mb-3">
                    Năm sản xuất: <span th:text="${xe.year}">2024</span>
                </p> 
                        <div class="d-grid gap-2">
                            <a th:href="@{/car-detail/{id}(id=${xe.id})}"
                            class="btn btn-primary">
                                <i class="bi bi-eye"></i> Xem chi tiết
                            </a>
                             
                            <a th:href="@{/admin/edit/{id}(id=${xe.id})}" class="btn btn-warning text-dark">
                                <i class="bi bi-pencil-square"></i> Sửa thông tin
                            </a>
                            <a th:href="@{/admin/delete/{id}(id=${xe.id})}" 
   class="btn btn-danger"
   onclick="return confirm('Xác nhận xóa xe này khỏi hệ thống?')">
   <i class="bi bi-trash"></i> Xóa xe
</a>
                        </div>
                        </div>
                      </div>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center mt-4">

    <ul class="pagination">
        <li class="page-item" th:if="${currentPage > 0}">
            <a class="page-link"
               th:href="@{/admin/cars(page=${currentPage-1}, 
               keyword=${keyword},
    brand=${brand},
    minPrice=${minPrice},
    maxPrice=${maxPrice})}">
                Previous
            </a>
        </li>

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, totalPages-1)}"
            th:classappend="${i == currentPage} ? 'active'">

            <a class="page-link"
   th:href="@{/admin/cars(
       page=${i},
       keyword=${keyword},
       brand=${brand},
       minPrice=${minPrice},
       maxPrice=${maxPrice}
   )}"
   th:text="${i+1}">
</a>

        </li>

        <li class="page-item"
            th:if="${currentPage < totalPages-1}">

            <a class="page-link"
               th:href="@{/admin/cars(page=${currentPage+1},
               keyword=${keyword},
    brand=${brand},
    minPrice=${minPrice},
    maxPrice=${maxPrice})}">
               Next
            </a>

        </li>

    </ul>

</div>
        </div>
        </div>
        </body>
</html>
