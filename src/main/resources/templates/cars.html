      <form th:action="@{/cars}" method="get">
        <div class="row g-2">

            <!-- Tên xe -->
            <div class="col-md-3">
                <input type="text" name="keyword"
                       class="form-control"
                       placeholder="Nhập tên xe..."
                       th:value="${keyword}">
            </div>

            <!-- Hãng xe -->
            <!-- <div class="col-md-3">
                <input type="text" name="brand"
                       class="form-control"
                       placeholder="Hãng xe (Toyota, BMW...)"
                       th:value="${brand}">
            </div> -->
             <div class="col-md-3">
        <select name="brand" class="form-control">
            <option value="">Tất cả hãng</option>
            <option value="Toyota">Toyota</option>
            <option value="Audi">Audi</option>
            <option value="Mercedes">Mercedes</option>
            <option value="VinFast">VinFast</option>
        </select>
    </div>

            <!-- Giá từ -->
            <div class="col-md-2">
                <input type="number" name="minPrice"
                       class="form-control"
                       placeholder="Giá từ"
                       th:value="${minPrice}">
            </div>

            <!-- Giá đến -->
            <div class="col-md-2">
                <input type="number" name="maxPrice"
                       class="form-control"
                       placeholder="Đến"
                       th:value="${maxPrice}">
            </div>

            <!-- Nút tìm -->
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">
                    🔍 Tìm kiếm
                </button>
            </div>

        </div>
    </form>
</div>

<div class="brand-list">

    <a th:href="@{/cars(brand='Toyota')}"
       class="brand-item"
       th:classappend="${brand == 'Toyota'} ? ' active'">

        <img th:src="@{/images/logo/toyota.png}" class="brand-logo">
        <span>Toyota</span>
    </a>
   

    <a th:href="@{/cars(brand='Audi')}"
       class="brand-item"
       th:classappend="${brand == 'Audi'} ? ' active'">

        <img th:src="@{/images/logo/audi.png}" class="brand-logo">
        <span>Audi</span>
    </a>

    <a th:href="@{/cars(brand='Honda')}"
       class="brand-item"
       th:classappend="${brand == 'Honda'} ? ' active'">

        <img th:src="@{/images/logo/honda.png}" class="brand-logo">
        <span>Honda</span>
    </a>

    <a th:href="@{/cars(brand='Kia')}"
       class="brand-item"
       th:classappend="${brand == 'Kia'} ? ' active'">

        <img th:src="@{/images/logo/kia.png}" class="brand-logo">
        <span>KIA</span>
    </a>
     <a th:href="@{/cars(brand='Hyundai')}"
       class="brand-item"
       th:classappend="${brand == 'Hyundai'} ? ' active'">

        <img th:src="@{/images/logo/hyundai.png}" class="brand-logo">
        <span>Hyundai</span>
    </a>
     <a th:href="@{/cars(brand='Mazda')}"
       class="brand-item"
       th:classappend="${brand == 'Mazda'} ? ' active'">

        <img th:src="@{/images/logo/mazda.png}" class="brand-logo">
        <span>Mazda</span>
    </a>

</div>

            <div class="row">  
     <div class="col-md-4 mb-4" th:each="xe : ${listXe}">
        <div class="card shadow-sm h-100">
            <div class="car-img-container">
            <!-- <img th:src="${xe.image}" class="card-img-top" alt="Car"> -->
            <img th:src="${xe.image.startsWith('http')} 
              ? ${xe.image}: @{/images/{file}(file=${xe.image})}" class="card-img-top" alt="Car">
            </div>
            <div class="card-body">
                <h5 class="card-title fw-bold" th:text="${xe.name}">Tên xe mẫu</h5>
                <p class="text-danger fw-bold fs-5" 
                   th:text="${#numbers.formatDecimal(xe.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                </p>
                
                <p class="card-text text-muted small mb-3">
                    Năm sản xuất: <span th:text="${xe.year}">2024</span>
                </p>
                
                <div class="mt-auto d-grid gap-2">
                    <a th:href="@{/car-detail/{id}(id=${xe.id})}" class="btn btn-primary">Xem chi tiết</a>
                    <button class="btn btn-success">
                                <i class="bi bi-cart-plus"></i> Mua ngay </button>
                    </div> 
                </div>
             </div>
         </div>
             </div>
             <div class="d-flex justify-content-center mt-4">

    <ul class="pagination">

        <!-- Previous -->
        <li class="page-item" th:if="${currentPage > 0}">
            <a class="page-link"
               th:href="@{/cars(page=${currentPage-1},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}">
               Previous
            </a>
        </li>

        <!-- Số trang -->
        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, totalPages-1)}"
            th:classappend="${i == currentPage} ? 'active'">

            <a class="page-link"
               th:href="@{/cars(page=${i},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}"
               th:text="${i+1}">
            </a>

        </li>

        <!-- Next -->
        <li class="page-item"
            th:if="${currentPage < totalPages-1}">

            <a class="page-link"
               th:href="@{/cars(page=${currentPage+1},
                keyword=${keyword},
                brand=${brand},
                minPrice=${minPrice},
                maxPrice=${maxPrice})}">
               Next
            </a>

        </li>

    </ul>
             
</div>
            </div>
         </body>
</html>
